name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/build-release.ts
      - name: Portable zip
        run: Compress-Archive -Path dist/crossbean-windows-x64/* -DestinationPath dist/crossbean-windows-x64.zip
      - name: Installer icon
        run: |
          choco install imagemagick.app -y --no-progress
          magick -background none assets/icon.svg -resize 256x256 packaging/windows/icon.ico
        continue-on-error: true
      - name: Build installer
        run: |
          choco install innosetup -y --no-progress
          iscc packaging/windows/installer.iss
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/crossbean-windows-x64.zip
            dist/crossbean-setup-windows-x64.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/build-release.ts
      - run: sudo apt-get update && sudo apt-get install -y rpm
      - run: bash packaging/linux/build-deb.sh
      - run: bash packaging/linux/build-rpm.sh
      - name: Portable tarball
        run: tar -C dist -czf dist/crossbean-linux-x64.tar.gz crossbean-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.deb
            dist/*.rpm
            dist/crossbean-linux-x64.tar.gz

  macos:
    strategy:
      matrix:
        include:
          - runner: macos-14 # arm64
          - runner: macos-13 # x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/build-release.ts
      - run: bash packaging/macos/build-app.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.runner }}
          path: dist/*.dmg

  publish:
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
